name: ElektroOffer CI Pipeline

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: "Safely simulate a CI failure and verify the diagnostic artifact"
        required: false
        type: boolean
        default: false

jobs:
  ci:
    name: Build and test
    runs-on: windows-latest
    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_NOLOGO: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore ElektroOffer_app.slnx

      - name: Build solution
        run: dotnet build ElektroOffer_app.slnx --configuration Debug --no-restore

      - name: Run unit tests
        run: dotnet test ElektroOffer_app.Tests.Unit/ElektroOffer_app.Tests.Unit.csproj --configuration Debug --no-build --no-restore --verbosity normal --logger trx --results-directory TestResults/Unit --collect:"XPlat Code Coverage"

      - name: Run integration tests
        if: github.event_name == 'workflow_dispatch'
        run: dotnet test ElektroOffer_app.Tests.Integration/ElektroOffer_app.Tests.Integration.csproj --configuration Debug --no-build --no-restore --verbosity normal --logger trx --results-directory TestResults/Integration --collect:"XPlat Code Coverage"

      - name: Simulate diagnostic failure
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.simulate_failure }}
        shell: pwsh
        run: |
          Write-Error "Intentional failure requested by workflow_dispatch for diagnostic verification."
          exit 1

      - name: Generate short CI summary
        if: always()
        shell: pwsh
        run: |
          function Write-TrxSummary {
            param(
              [string] $Title,
              [string] $Path
            )

            $file = Get-ChildItem -Path $Path -Filter *.trx -Recurse -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime |
              Select-Object -Last 1

            if (-not $file) {
              "| $Title | not run | 0 | 0 | 0 | 0 | 0 |" | Out-File elektrooffer-ci-summary.md -Append -Encoding utf8
              return
            }

            [xml] $xml = Get-Content $file.FullName
            $resultSummary = $xml.SelectSingleNode("//*[local-name()='ResultSummary']")
            $counters = $xml.SelectSingleNode("//*[local-name()='ResultSummary']/*[local-name()='Counters']")
            $outcome = $resultSummary.outcome

            "| $Title | $outcome | $($counters.total) | $($counters.executed) | $($counters.passed) | $($counters.failed) | $($counters.notExecuted) |" |
              Out-File elektrooffer-ci-summary.md -Append -Encoding utf8
          }

          "# ElektroOffer CI Summary" | Out-File elektrooffer-ci-summary.md -Encoding utf8
          "" | Out-File elektrooffer-ci-summary.md -Append -Encoding utf8
          "- Timestamp: $(Get-Date -Format o)" | Out-File elektrooffer-ci-summary.md -Append -Encoding utf8
          "- Event: $env:GITHUB_EVENT_NAME" | Out-File elektrooffer-ci-summary.md -Append -Encoding utf8
          "- Ref: $env:GITHUB_REF" | Out-File elektrooffer-ci-summary.md -Append -Encoding utf8
          "- Branch: $env:GITHUB_REF_NAME" | Out-File elektrooffer-ci-summary.md -Append -Encoding utf8
          "- Commit: $env:GITHUB_SHA" | Out-File elektrooffer-ci-summary.md -Append -Encoding utf8
          "- Run: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID" | Out-File elektrooffer-ci-summary.md -Append -Encoding utf8
          "" | Out-File elektrooffer-ci-summary.md -Append -Encoding utf8
          "| Suite | Outcome | Total | Executed | Passed | Failed | Not executed |" | Out-File elektrooffer-ci-summary.md -Append -Encoding utf8
          "|---|---:|---:|---:|---:|---:|---:|" | Out-File elektrooffer-ci-summary.md -Append -Encoding utf8
          Write-TrxSummary -Title "Unit" -Path "TestResults/Unit"
          Write-TrxSummary -Title "Integration" -Path "TestResults/Integration"

          Get-Content elektrooffer-ci-summary.md | Out-File $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload short CI summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-ci-summary
          path: elektrooffer-ci-summary.md
          retention-days: 14

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-coverage
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-test-results
          path: TestResults
          retention-days: 14

  release:
    name: Release publish
    if: startsWith(github.ref, 'refs/tags/')
    needs: ci
    runs-on: windows-latest
    environment:
      name: manual-approval

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish application
        shell: pwsh
        run: ./scripts/commands/run-publish.ps1

      - name: Upload portable application
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-portable-win-x64
          path: artifacts/publish/win-x64
          retention-days: 30

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-installer-win-x64
          path: artifacts/installer/*.exe
          if-no-files-found: error
          retention-days: 30

  diagnostic:
    name: Diagnostic log
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    needs:
      - ci
      - release
    runs-on: windows-latest
    env:
      CI_JOB_RESULT: ${{ needs.ci.result }}
      RELEASE_JOB_RESULT: ${{ needs.release.result }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Generate detailed failure log
        shell: pwsh
        run: |
          "============================================================" | Out-File elektrooffer-ci-error.log
          "CI DIAGNOSTIC LOG" | Out-File elektrooffer-ci-error.log -Append
          "Workflow: $env:GITHUB_WORKFLOW" | Out-File elektrooffer-ci-error.log -Append
          "Run number: $env:GITHUB_RUN_NUMBER" | Out-File elektrooffer-ci-error.log -Append
          "Run URL: $env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID" | Out-File elektrooffer-ci-error.log -Append
          "Timestamp: $(Get-Date -Format o)" | Out-File elektrooffer-ci-error.log -Append
          "Ref: $env:GITHUB_REF" | Out-File elektrooffer-ci-error.log -Append
          "Commit: $env:GITHUB_SHA" | Out-File elektrooffer-ci-error.log -Append
          "Event: $env:GITHUB_EVENT_NAME" | Out-File elektrooffer-ci-error.log -Append
          "Runner: $env:RUNNER_NAME / $env:RUNNER_OS / $env:RUNNER_ARCH" | Out-File elektrooffer-ci-error.log -Append
          "CI job result: $env:CI_JOB_RESULT" | Out-File elektrooffer-ci-error.log -Append
          "Release job result: $env:RELEASE_JOB_RESULT" | Out-File elektrooffer-ci-error.log -Append
          "Dotnet SDK: $(dotnet --version)" | Out-File elektrooffer-ci-error.log -Append
          "============================================================" | Out-File elektrooffer-ci-error.log -Append

          "" | Out-File elektrooffer-ci-error.log -Append
          "RESTORE" | Out-File elektrooffer-ci-error.log -Append
          dotnet restore ElektroOffer_app.slnx --verbosity detailed *>> elektrooffer-ci-error.log

          "" | Out-File elektrooffer-ci-error.log -Append
          "BUILD" | Out-File elektrooffer-ci-error.log -Append
          dotnet build ElektroOffer_app.slnx --configuration Debug --no-restore --verbosity detailed *>> elektrooffer-ci-error.log

          "" | Out-File elektrooffer-ci-error.log -Append
          "UNIT TESTS" | Out-File elektrooffer-ci-error.log -Append
          dotnet test ElektroOffer_app.Tests.Unit/ElektroOffer_app.Tests.Unit.csproj --configuration Debug --verbosity detailed *>> elektrooffer-ci-error.log

          "" | Out-File elektrooffer-ci-error.log -Append
          "INTEGRATION TESTS" | Out-File elektrooffer-ci-error.log -Append
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            dotnet test ElektroOffer_app.Tests.Integration/ElektroOffer_app.Tests.Integration.csproj --configuration Debug --verbosity detailed *>> elektrooffer-ci-error.log
          } else {
            "Skipped: integration tests run only through manual workflow dispatch." | Out-File elektrooffer-ci-error.log -Append
          }

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-ci-error-log
          path: elektrooffer-ci-error.log
          retention-days: 14
