name: ElektroOffer CI Pipeline

on:
  push:
    branches:
      - feature/**
      - hotfix/**
      - release/**
    tags:
      - "*"
  pull_request:
    branches:
      - dev
      - test
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        run: dotnet restore ElektroOffer_app.slnx

      - name: Build solution
        run: dotnet build ElektroOffer_app.slnx --configuration Debug --no-restore

      - name: Run unit tests
        run: dotnet test ElektroOffer_app.Tests.Unit/ElektroOffer_app.Tests.Unit.csproj --configuration Debug --no-build --verbosity normal

      - name: Run integration tests
        run: dotnet test ElektroOffer_app.Tests.Integration/ElektroOffer_app.Tests.Integration.csproj --configuration Debug --no-build --verbosity normal

  release:
    name: Release publish
    if: startsWith(github.ref, 'refs/tags/')
    needs: ci
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish application
        run: >
          dotnet publish ElektroOffer_app/ElektroOffer_app.csproj
          --configuration Release
          --output ElektroOffer_app/publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-publish
          path: ElektroOffer_app/publish

  diagnostic:
    name: Diagnostic log
    if: failure()
    needs:
      - ci
      - release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Generate detailed failure log
        shell: pwsh
        run: |
          "============================================================" | Out-File elektrooffer-ci-error.log
          "CI DIAGNOSTIC LOG" | Out-File elektrooffer-ci-error.log -Append
          "Timestamp: $(Get-Date -Format o)" | Out-File elektrooffer-ci-error.log -Append
          "Ref: $env:GITHUB_REF" | Out-File elektrooffer-ci-error.log -Append
          "Event: $env:GITHUB_EVENT_NAME" | Out-File elektrooffer-ci-error.log -Append
          "============================================================" | Out-File elektrooffer-ci-error.log -Append

          "" | Out-File elektrooffer-ci-error.log -Append
          "RESTORE" | Out-File elektrooffer-ci-error.log -Append
          dotnet restore ElektroOffer_app.slnx --verbosity detailed *>> elektrooffer-ci-error.log

          "" | Out-File elektrooffer-ci-error.log -Append
          "BUILD" | Out-File elektrooffer-ci-error.log -Append
          dotnet build ElektroOffer_app.slnx --configuration Debug --no-restore --verbosity detailed *>> elektrooffer-ci-error.log

          "" | Out-File elektrooffer-ci-error.log -Append
          "UNIT TESTS" | Out-File elektrooffer-ci-error.log -Append
          dotnet test ElektroOffer_app.Tests.Unit/ElektroOffer_app.Tests.Unit.csproj --configuration Debug --verbosity detailed *>> elektrooffer-ci-error.log

          "" | Out-File elektrooffer-ci-error.log -Append
          "INTEGRATION TESTS" | Out-File elektrooffer-ci-error.log -Append
          dotnet test ElektroOffer_app.Tests.Integration/ElektroOffer_app.Tests.Integration.csproj --configuration Debug --verbosity detailed *>> elektrooffer-ci-error.log

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-ci-error-log
          path: elektrooffer-ci-error.log
