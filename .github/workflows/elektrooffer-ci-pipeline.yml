name: ElektroOffer CI Pipeline

# =====================================================================
# 🚀 TRIGGERY
# =====================================================================
on:
  push:
    branches:
      - hotfix/**
      - feature/**
      - release/**
  pull_request:
    branches:
      - dev
      - test
      - main
  # Tag = release pipeline
  workflow_dispatch:
  # Tag trigger
  create:
    tags:
      - '*'

# =====================================================================
# 🟩 JOB 1 — CI elektrooffer
# Běží na: Push (feature/release/hotfix), Pull Request, Tag
# Obsahuje: Restore, Build, Testy, Minimal Log
# =====================================================================
jobs:
  CI-elektrooffer:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        if: always()
        uses: actions/checkout@v4

      - name: Setup .NET
        if: always()
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet Packages
        if: always()
        run: dotnet restore ElektroOffer_app.slnx

      - name: Build Solution
        if: always()
        run: dotnet build ElektroOffer_app.slnx --configuration Release --no-restore

      - name: Run Unit Tests
        if: always()
        run: dotnet test ElektroOffer_app.Tests.Unit/ElektroOffer_app.Tests.Unit.csproj --configuration Release --verbosity normal

      - name: Run Integration Tests
        if: always()
        run: dotnet test ElektroOffer_app.Tests.Integration/ElektroOffer_app.Tests.Integration.csproj --configuration Release --verbosity normal

      - name: Generate CI Log
        if: always()
        run: |
          echo "" >> elektrooffer-ci.log
          echo "============================================================" > elektrooffer-ci.log
          echo "🟩 CI SHORT LOG" >> elektrooffer-ci.log
          echo "Timestamp: $(date)" >> elektrooffer-ci.log
          echo "Working directory: $(pwd)" >> elektrooffer-ci.log
          echo "============================================================" >> elektrooffer-ci.log

          echo "" >> elektrooffer-ci.log
          echo "------------------------------------------------------------" >> elektrooffer-ci.log
          echo "🔧 BUILD (minimal)" >> elektrooffer-ci.log
          echo "------------------------------------------------------------" >> elektrooffer-ci.log
          dotnet build ElektroOffer_app.slnx --configuration Release --verbosity minimal >> elektrooffer-ci.log
          echo "Exit code (build): $?" >> elektrooffer-ci.log

          echo "" >> elektrooffer-ci.log
          echo "------------------------------------------------------------" >> elektrooffer-ci.log
          echo "🧪 UNIT TESTS (minimal)" >> elektrooffer-ci.log
          echo "------------------------------------------------------------" >> elektrooffer-ci.log

          powershell -Command "
            \$result = dotnet test ElektroOffer_app.Tests.Unit/ElektroOffer_app.Tests.Unit.csproj --verbosity minimal
            Add-Content elektrooffer-ci.log 'UNIT TESTS RESULT:'
            Add-Content elektrooffer-ci.log '----------------------------------------'

            \$summary = \$result | Select-String 'Passed!'
            if (\$summary) {
                \$parts = \$summary.ToString().Split(',')
                foreach (\$p in \$parts) {
                    Add-Content elektrooffer-ci.log ('  ' + \$p.Trim())
                }
            } else {
                Add-Content elektrooffer-ci.log '  (No summary found)'
            }

            Add-Content elektrooffer-ci.log ''
            Add-Content elektrooffer-ci.log ('Exit code (unit tests): ' + \$LASTEXITCODE)"

            echo "" >> elektrooffer-ci.log
            echo "------------------------------------------------------------" >> elektrooffer-ci.log
            echo "🧪 INTEGRATION TESTS (detailed)" >> elektrooffer-ci.log
            echo "------------------------------------------------------------" >> elektrooffer-ci.log

            powershell -Command "
              \$result = dotnet test ElektroOffer_app.Tests.Integration/ElektroOffer_app.Tests.Integration.csproj --verbosity minimal
              Add-Content elektrooffer-ci.log 'INTEGRATION TESTS RESULT:'
              Add-Content elektrooffer-ci.log '----------------------------------------'

              \$summary = \$result | Select-String 'Passed!'
              if (\$summary) {
                  \$parts = \$summary.ToString().Split(',')
                  foreach (\$p in \$parts) {
                      Add-Content elektrooffer-ci.log ('  ' + \$p.Trim())
                  }
              } else {
                  Add-Content elektrooffer-ci.log '  (No summary found)'
              }

              Add-Content elektrooffer-ci.log ''
              Add-Content elektrooffer-ci.log ('Exit code (integration tests): ' + \$LASTEXITCODE)"


      - name: Upload CI log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-ci-log
          path: elektrooffer-ci.log


# =====================================================================
# 🟥 JOB 2 — Release build
# Běží pouze při TAGU
# Obsahuje: Publish, Full Log, Artefakty
# =====================================================================
  Release-build:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    needs: CI-elektrooffer

    steps:
      - name: Checkout repository
        if: always()
        uses: actions/checkout@v4

      - name: Setup .NET
        if: always()
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Application
        if: always()
        run: |
          dotnet publish `
            ElektroOffer_app/zElektroOffer_app.csproj `
            --configuration Release `
            --output ElektroOffer_app/publish

      - name: Upload Publish Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-publish
          path: ElektroOffer_app/publish


# =====================================================================
# 🟦 JOB — CI diagnostic
# Vygeneruje detailní log pokaždé, když CI-elektrooffer nebo Release-build selže
# =====================================================================
  CI-diagnostic:
    needs: [CI-elektrooffer, Release-build]
    if: always() && (
          needs.CI-elektrooffer.result == 'failure' ||
          needs.Release-build.result == 'failure'
        )
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        if: always()
        uses: actions/checkout@v4

      - name: Generate Full CI Log (Error)
        if: always()
        run: |
          echo "============================================================" > elektrooffer-ci-error.log
          echo "🔴 CI DIAGNOSTIC LOG" >> elektrooffer-ci-error.log
          echo "Timestamp: $(date)" >> elektrooffer-ci-error.log
          echo "Working directory: $(pwd)" >> elektrooffer-ci-error.log
          echo "============================================================" >> elektrooffer-ci-error.log

          echo "" >> elektrooffer-ci-error.log
          echo "------------------------------------------------------------" >> elektrooffer-ci-error.log
          echo "🔧 BUILD (detailed)" >> elektrooffer-ci-error.log
          echo "------------------------------------------------------------" >> elektrooffer-ci-error.log
          dotnet build ElektroOffer_app.slnx --configuration Release --verbosity detailed >> elektrooffer-ci-error.log
          echo "Exit code (build): $?" >> elektrooffer-ci-error.log

          echo "" >> elektrooffer-ci-error.log
          echo "------------------------------------------------------------" >> elektrooffer-ci-error.log
          echo "🧪 UNIT TESTS (detailed)" >> elektrooffer-ci-error.log
          echo "------------------------------------------------------------" >> elektrooffer-ci-error.log

          powershell -Command "
            \$result = dotnet test ElektroOffer_app.Tests.Unit/ElektroOffer_app.Tests.Unit.csproj --verbosity minimal
            Add-Content elektrooffer-ci-error.log 'UNIT TESTS RESULT:'
            Add-Content elektrooffer-ci-error.log '----------------------------------------'

            \$summary = \$result | Select-String 'Passed!'
            if (\$summary) {
                \$parts = \$summary.ToString().Split(',')
                foreach (\$p in \$parts) {
                    Add-Content elektrooffer-ci-error.log ('  ' + \$p.Trim())
                }
            } else {
                Add-Content elektrooffer-ci-error.log '  (No summary found)'
            }

            Add-Content elektrooffer-ci-error.log ''
            Add-Content elektrooffer-ci-error.log ('Exit code (unit tests): ' + \$LASTEXITCODE)"

          echo "" >> elektrooffer-ci-error.log
          echo "------------------------------------------------------------" >> elektrooffer-ci-error.log
          echo "🧪 INTEGRATION TESTS (detailed)" >> elektrooffer-ci-error.log
          echo "------------------------------------------------------------" >> elektrooffer-ci-error.log

          powershell -Command "
            \$result = dotnet test ElektroOffer_app.Tests.Integration/ElektroOffer_app.Tests.Integration.csproj --verbosity minimal
            Add-Content elektrooffer-ci-error.log 'INTEGRATION TESTS RESULT:'
            Add-Content elektrooffer-ci-error.log '----------------------------------------'

            \$summary = \$result | Select-String 'Passed!'
            if (\$summary) {
                \$parts = \$summary.ToString().Split(',')
                foreach (\$p in \$parts) {
                    Add-Content elektrooffer-ci-error.log ('  ' + \$p.Trim())
                }
            } else {
                Add-Content elektrooffer-ci-error.log '  (No summary found)'
            }

            Add-Content elektrooffer-ci-error.log ''
            Add-Content elektrooffer-ci-error.log ('Exit code (integration tests): ' + \$LASTEXITCODE)"

      - name: Upload CI log error artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-ci-error-log
          path: elektrooffer-ci-error.log

