name: ElektroOffer CI Pipeline

# =====================================================================
# 🚀 TRIGGERY
# =====================================================================
on:
  push:
    branches:
      - hotfix/**
      - feature/**
      - release/**
  pull_request:
    branches:
      - dev
      - test
      - main
  # Tag = release pipeline
  workflow_dispatch:
  # Tag trigger
  create:
    tags:
      - '*'

# =====================================================================
# 🟩 JOB 1 — CI elektrooffer
# Běží na: Push (feature/release/hotfix), Pull Request, Tag
# Obsahuje: Restore, Build, Testy, Minimal Log
# =====================================================================
jobs:
  CI-elektrooffer:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        if: always()
        uses: actions/checkout@v4

      - name: Setup .NET
        if: always()
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet Packages
        if: always()
        run: dotnet restore ElektroOffer_app.slnx

      - name: Build Solution
        if: always()
        run: dotnet build ElektroOffer_app.slnx --configuration Release --no-restore

      - name: Run Unit Tests
        if: always()
        run: dotnet test ElektroOffer_app.Tests.Unit/ElektroOffer_app.Tests.Unit.csproj --configuration Release --verbosity normal

      - name: Run Integration Tests
        if: always()
        run: dotnet test ElektroOffer_app.Tests.Integration/ElektroOffer_app.Tests.Integration.csproj --configuration Release --verbosity normal

      - name: Generate CI Log
        if: always()
        run: |
          echo "=== CI LOG START ===" > elektrooffer-ci.log
          echo "Build + Test summary:" >> elektrooffer-ci.log
          dotnet build ElektroOffer_app.slnx --configuration Release --verbosity minimal >> elektrooffer-ci.log
          dotnet test ElektroOffer_app.Tests.Unit/ElektroOffer_app.Tests.Unit.csproj --verbosity minimal >> elektrooffer-ci.log
          dotnet test ElektroOffer_app.Tests.Integration/ElektroOffer_app.Tests.Integration.csproj --verbosity minimal >> elektrooffer-ci.log
          echo "=== CI LOG END ===" >> elektrooffer-ci.log

      - name: Upload CI log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-ci-log
          path: elektrooffer-ci.log


# =====================================================================
# 🟥 JOB 2 — Release build
# Běží pouze při TAGU
# Obsahuje: Publish, Full Log, Artefakty
# =====================================================================
  Release-build:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    needs: CI-elektrooffer

    steps:
      - name: Checkout repository
        if: always()
        uses: actions/checkout@v4

      - name: Setup .NET
        if: always()
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Application
        if: always()
        run: |
          dotnet publish `
            ElektroOffer_app/ElektroOffer_app.csproj `
            --configuration Release `
            --output ElektroOffer_app/publish

      - name: Upload Publish Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-publish
          path: ElektroOffer_app/publish


# =====================================================================
# 🟦 JOB — CI diagnostic
# Vygeneruje detailní log pokaždé, když CI-elektrooffer nebo Release-build selže
# =====================================================================
  CI-diagnostic:
    needs: [CI-elektrooffer, Release-build]
    if: always() && (
          needs.CI-elektrooffer.result == 'failure' ||
          needs.Release-build.result == 'failure' ||
          needs.Release-build.result == 'skipped'
        )
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        if: always()
        uses: actions/checkout@v4

      - name: Generate Full CI Log (Error)
        if: always()
        run: |
          echo "=== ERROR CI LOG START ===" > elektrooffer-ci-error.log
          dotnet build ElektroOffer_app.slnx --configuration Release --verbosity detailed >> elektrooffer-ci-error.log
          dotnet test ElektroOffer_app.Tests.Unit/ElektroOffer_app.Tests.Unit.csproj --verbosity detailed >> elektrooffer-ci-error.log
          dotnet test ElektroOffer_app.Tests.Integration/ElektroOffer_app.Tests.Integration.csproj --verbosity detailed >> elektrooffer-ci-error.log
          echo "=== ERROR CI LOG END ===" >> elektrooffer-ci-error.log

      - name: Upload CI log error artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elektrooffer-ci-error-log
          path: elektrooffer-ci-error.log
