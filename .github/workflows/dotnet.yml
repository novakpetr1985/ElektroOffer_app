name: ElektroOffer CI

# ============================================================
# 🧩 TRIGGERY — kdy se workflow spustí
# ============================================================
on:
  push:
    branches: [ "**" ]     # spustí se na jakýkoliv push do libovolné větve
    tags:     [ "**" ]     # spustí se na jakýkoliv push tagu (v1.7.5, beta, cokoliv)
  pull_request:
    branches: [ "**" ]     # spustí se na jakýkoliv PR mezi libovolnými větvemi

# ============================================================
# 🧪 JOB — jen testy (UNIT + Integration), bez samostatného buildu
# ============================================================
jobs:
  tests-only:
    runs-on: windows-latest   # WPF + .NET Desktop → musí být Windows runner

    steps:
    # --------------------------------------------------------
    # 📥 1) Stažení repozitáře
    # --------------------------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # --------------------------------------------------------
    # ⚙️ 2) Instalace .NET SDK
    # --------------------------------------------------------
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'   # tvoje verze .NET podle README

    # --------------------------------------------------------
    # 🧪 3) Spuštění všech testů (Unit + Integration)
    #     dotnet test si solution sám přeloží (není potřeba samostatný build krok)
    # --------------------------------------------------------
    - name: Run all tests (Unit + Integration)
      run: dotnet test ElektroOffer_app.slnx --configuration Release --verbosity normal
